name: Deploy API (Cloud Run)

# Auto-deploys tickrr-api on any push to main that touches backend/.
# Keyless auth via Workload Identity Federation (see docs/CICD.md). Existing env vars are preserved.

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy tickrr-api
        run: |
          gcloud run deploy tickrr-api \
            --source backend \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --quiet
